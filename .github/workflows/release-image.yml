name: Build and release image

on:
  push:
    branches:
      - main
    paths:
      - "Makefile"
      - "rust-toolchain.toml"
      - "boot/**"
      - "include/**"
      - "kernel/**"
      - "scripts/**"
      - "tests/**"
      - "tools/**"
      - "user/**"
      - "userlib/**"
      - "vmware/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rabbitbone-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential clang lld llvm python3 make

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.94.1 --profile minimal --component rust-src --target x86_64-unknown-linux-gnu
          rustup default 1.94.1

      - name: Check release version
        id: version
        run: python3 scripts/check_release_version.py --github-output

      - name: Check release tag is new
        run: |
          tag="${{ steps.version.outputs.tag }}"
          target="$(git ls-remote --tags origin "refs/tags/${tag}^{}" | awk '{print $1}')"
          if [ -z "$target" ]; then
            target="$(git ls-remote --tags origin "refs/tags/${tag}" | awk '{print $1}')"
          fi
          if [ -n "$target" ] && [ "$target" != "$GITHUB_SHA" ]; then
            echo "::error::Release tag ${tag} already points at ${target}; bump include/rabbitbone/version.h before publishing code changes."
            exit 1
          fi
          if [ -n "$target" ]; then
            echo "::notice::Release tag ${tag} already points at this commit; continuing validation."
          fi

      - name: Build and test image
        run: |
          make clean
          make test
          make image

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp build/rabbitbone-live.iso "dist/rabbitbone-${{ steps.version.outputs.version }}-live.iso"
          sha256sum "dist/rabbitbone-${{ steps.version.outputs.version }}-live.iso" > "dist/rabbitbone-${{ steps.version.outputs.version }}-live.iso.sha256"
          cat > dist/release-notes.md <<EOF
          Rabbitbone ${{ steps.version.outputs.version }} automated UEFI live ISO.

          Built from commit $GITHUB_SHA after passing make test.

          The image targets UEFI x86_64 virtual machines.
          EOF

      - name: Upload release files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rabbitbone-release-files
          path: dist/*
          if-no-files-found: error

  publish-release:
    needs: build-test
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check release version
        id: version
        run: python3 scripts/check_release_version.py --github-output

      - name: Download release files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: rabbitbone-release-files
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub release ${{ steps.version.outputs.tag }} already exists; keeping existing assets."
            exit 0
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            "dist/rabbitbone-${{ steps.version.outputs.version }}-live.iso" \
            "dist/rabbitbone-${{ steps.version.outputs.version }}-live.iso.sha256" \
            --title "Rabbitbone ${{ steps.version.outputs.version }}" \
            --notes-file dist/release-notes.md
