name: Feature request
description: Suggest a focused Rabbitbone improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Rabbitbone gain or change?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful for the kernel, filesystem, userland, tooling, or documentation?
    validations:
      required: true
  - type: textarea
    id: shape
    attributes:
      label: Possible implementation shape
      description: Optional notes about design, affected files, tests, or compatibility concerns.
